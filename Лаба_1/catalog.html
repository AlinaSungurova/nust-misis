<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Каталог книг</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Книжный склад</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Главная</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="catalog.html">Каталог</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <header class="py-4 border-bottom bg-light">
      <div class="container text-center">
        <h1 class="display-6 mb-0">Каталог</h1>
      </div>
    </header>

    <main class="container py-5">
      <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col">
          <div class="card h-100 shadow-sm">
            <img
              src="img/book1.jpg"
              class="card-img-top catalog-img"
              alt="Фантастика"
            />
            <div class="card-body">
              <h5 class="card-title">Фантастика</h5>
              <p class="card-text">
                Книги о будущем, космосе и необычных мирах.
              </p>
              <a href="product.html" class="btn btn-outline-primary"
                >Подробнее</a
              >
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card h-100 shadow-sm">
            <img
              src="img/book2.jpg"
              class="card-img-top catalog-img"
              alt="Детективы"
            />
            <div class="card-body">
              <h5 class="card-title">Детективы</h5>
              <p class="card-text">
                Истории с расследованиями, тайнами и загадками.
              </p>
              <a href="product.html" class="btn btn-outline-primary"
                >Подробнее</a
              >
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card h-100 shadow-sm">
            <img
              src="img/book3.jpg"
              class="card-img-top catalog-img"
              alt="Классика"
            />
            <div class="card-body">
              <h5 class="card-title">Классика</h5>
              <p class="card-text">
                Произведения известных авторов и вечные сюжеты.
              </p>
              <a href="product.html" class="btn btn-outline-primary"
                >Подробнее</a
              >
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="border-top py-3 bg-light">
      <div class="container text-center">
        <span>&copy; Все права защищены</span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
